name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - master  # Change this to 'main' if your default branch is called main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Vite requires Node 18+, using 20 is safest
          cache: 'npm'

      - name: Install dependencies
        # npm ci is better for CI/CD as it strictly follows package-lock.json
        run: npm ci

      - name: Build project
        # Because Spring Boot isn't running here, the prebuild script will warn
        # but fall back to the openapi.yaml committed in the repo
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite outputs to the 'dist' folder by default
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4